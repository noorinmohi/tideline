name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Install & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # Deploy is wired up but intentionally inert for now.
  # Configure a Render deploy hook (Settings → Deploy Hook) and add it as the
  # RENDER_DEPLOY_HOOK_URL repo secret, then this job will trigger a deploy on
  # every push to main. Until the secret exists, the job is skipped.
  deploy:
    name: Deploy to Render
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy."
            echo "Add it under Settings → Secrets and variables → Actions to enable."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."
